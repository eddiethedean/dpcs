dpcsVersion: "1.0.0"
id: "invalid.bad.flow.roles"
version: "0.1.0"
interface:
  inputs:
    - id: "raw"
      name: "Raw"
      contractRef: "contracts/raw.odcs.yaml"
      purpose: "raw"
  outputs:
    - id: "out"
      name: "Out"
      contractRef: "contracts/out.odcs.yaml"
      purpose: "out"
steps:
  - id: "a"
    type: "extension:noop"
    inputs:
      - id: "in"
    outputs:
      - id: "out"
graph:
  edges: []
dataFlow:
  - from: "steps.a.inputs.in"
    to: "interface.outputs.out"
    dataset: "bad"
  - from: "interface.inputs.raw"
    to: "steps.a.inputs.in"
    dataset: "raw"
  - from: "steps.a.outputs.out"
    to: "interface.outputs.out"
    dataset: "ok"
