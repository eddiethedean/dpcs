name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci-checks.yml

  publish-crates:
    name: Publish crates.io
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish dpcs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p dpcs --locked
      - name: Wait for crates.io index
        run: sleep 45
      - name: Publish dpcs-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for i in 1 2 3 4 5; do
            cargo publish -p dpcs-cli --locked && exit 0
            echo "publish attempt $i failed; waiting..."
            sleep 30
          done
          exit 1

  publish-pypi:
    name: Publish PyPI
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install maturin
        run: pip install maturin
      - name: Build and publish
        working-directory: bindings/python
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: maturin publish --username __token__ --password "$MATURIN_PYPI_TOKEN"

  publish-npm:
    name: Publish npm
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build package
        working-directory: bindings/wasm
        run: wasm-pack build --target bundler --release --out-dir pkg --out-name dpcs
      - name: Publish
        working-directory: bindings/wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm pkg set name=dpcs
          npm publish --access public

  publish-wasmer:
    name: Publish Wasmer
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install Wasmer CLI
        run: curl https://get.wasmer.io -sSfL | sh
      - name: Build wasm
        working-directory: bindings/wasm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          wasm-pack build --target web --release --out-dir pkg --out-name dpcs
          WASM=$(ls pkg/*_bg.wasm | head -1)
          cat > wasmer.toml << EOF
          [package]
          name = "dpcs"
          version = "${VERSION}"
          description = "DPCS WebAssembly toolkit (wasm-bindgen; host JS required)"
          license = "Apache-2.0 OR MIT"
          readme = "README.md"

          [[module]]
          name = "dpcs"
          source = "${WASM}"
          abi = "none"
          EOF
      - name: Publish
        working-directory: bindings/wasm
        env:
          WASMER_TOKEN: ${{ secrets.WASM_TOKEN }}
        run: |
          export PATH="$HOME/.wasmer/bin:$PATH"
          wasmer login --token "$WASMER_TOKEN"
          wasmer publish
