# Manually (re)publish WASM packages to npm and Wasmer.
#
# Builds from the ref this workflow runs on (push the wasm-opt fix to main first).
# `tag` only selects the version that must match Cargo.toml
# (for example v0.10.0). Secrets: `NPM_TOKEN`, `WASM_TOKEN`.

name: Publish WASM packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag whose version to publish (for example v0.10.0)
        required: true
        default: v0.10.0
      publish_npm:
        description: Publish the npm package
        type: boolean
        default: true
      publish_wasmer:
        description: Publish the Wasmer package
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish-npm:
    name: Publish npm
    if: ${{ inputs.publish_npm }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Check version matches tag
        run: |
          WANT="${{ inputs.tag }}"
          WANT="${WANT#v}"
          HAVE=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          if [ "$HAVE" != "$WANT" ]; then
            echo "workspace version $HAVE does not match tag version $WANT" >&2
            exit 1
          fi
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build package
        working-directory: bindings/wasm
        run: wasm-pack build --target bundler --release --out-dir pkg --out-name dpcs
      - name: Publish
        working-directory: bindings/wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is missing" >&2
            exit 1
          fi
          npm pkg set name=dpcs
          npm publish --access public

  publish-wasmer:
    name: Publish Wasmer
    if: ${{ inputs.publish_wasmer }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Check version matches tag
        run: |
          WANT="${{ inputs.tag }}"
          WANT="${WANT#v}"
          HAVE=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          if [ "$HAVE" != "$WANT" ]; then
            echo "workspace version $HAVE does not match tag version $WANT" >&2
            exit 1
          fi
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install Wasmer CLI
        run: curl https://get.wasmer.io -sSfL | sh
      - name: Build wasm
        working-directory: bindings/wasm
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          wasm-pack build --target web --release --out-dir pkg --out-name dpcs
          WASM=$(ls pkg/*_bg.wasm | head -1)
          cat > wasmer.toml << EOF
          [package]
          name = "dpcs"
          version = "${VERSION}"
          description = "DPCS WebAssembly toolkit (wasm-bindgen; host JS required)"
          license = "Apache-2.0 OR MIT"
          readme = "README.md"

          [[module]]
          name = "dpcs"
          source = "${WASM}"
          abi = "none"
          EOF
      - name: Publish
        working-directory: bindings/wasm
        env:
          WASMER_TOKEN: ${{ secrets.WASM_TOKEN }}
        run: |
          if [ -z "$WASMER_TOKEN" ]; then
            echo "WASM_TOKEN secret is missing" >&2
            exit 1
          fi
          export PATH="$HOME/.wasmer/bin:$PATH"
          wasmer login --token "$WASMER_TOKEN"
          wasmer publish
